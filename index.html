<!--
File: index.html
Description: Main login page for E-Trade system (login, reset password, welcome screen)
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Trade Company Portal</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- External CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <div id="login-view" class="form-content active">
        <h2>Login</h2>
        <form id="loginForm">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="userIn" placeholder=" " required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="passIn" placeholder=" " required>
                <i class="fa-solid fa-eye-slash toggle-password" id="eyeIcon"></i>
            </div>
            <button type="submit">Log In</button>
        </form>
        <div class="links">
            <a id="forgotLink">Forgot password?</a>
        </div>
    </div>

    <div id="reset-view" class="form-content">
        <h2>Reset Access</h2>
        <p class="info-text">Send a link to your email.</p>
        <form id="resetForm">
            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder=" " required>
            </div>
            <button type="submit">Send Recovery Link</button>
        </form>
        <div class="links">
            <a id="backToLogin">Back to Login</a>
        </div>
    </div>

    <div id="welcome-view" class="form-content">
        <div class="icon">💹</div>
        <h1>Welcome to E-Trade Company</h1>
        <p id="name-tag"></p>
        <button id="logoutBtn" class="logout">LOG OUT</button>
    </div>
</div>

<!-- External JS -->
<script src="js/script.js"></script>

</body>
</html>
